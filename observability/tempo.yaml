server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 2m
  max_block_bytes: 10000000
  trace_idle_period: 10s
  flush_check_period: 10s

compactor:
  compaction:
    block_retention: 30m

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
    pool:
      max_workers: 10
      queue_depth: 100

overrides:
  ingestion_rate_limit_bytes: 200000
  ingestion_burst_size_bytes: 400000
  max_traces_per_user: 500

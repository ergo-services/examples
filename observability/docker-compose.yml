services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: etcd
    restart: unless-stopped
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd=http://0.0.0.0:2380
      - --initial-cluster-token=observability-example-token
      - --initial-cluster-state=new
      - --log-level=warn
      - --logger=zap
      - --log-outputs=stderr
    mem_limit: 128m
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    environment:
      - GOMEMLIMIT=256MiB
    mem_limit: 512m
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    networks:
      - observability-net

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.listen-address=:9091
      - --storage.tsdb.retention.time=1h
      - --storage.tsdb.retention.size=100MB
    mem_limit: 256m
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - observability-net

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    mem_limit: 384m
    ports:
      - "8888:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=ergo
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/ergo-cluster.json:/var/lib/grafana/dashboards/ergo-cluster.json:ro
      - ./grafana/slowweb.json:/var/lib/grafana/dashboards/slowweb.json:ro
      - ./grafana/ergo-tracing.json:/var/lib/grafana/dashboards/ergo-tracing.json:ro
    depends_on:
      - prometheus
      - tempo
    networks:
      - observability-net

  slowweb:
    build:
      context: .
      target: slowweb
    container_name: slowweb
    restart: unless-stopped
    mem_limit: 64m
    networks:
      - observability-net

  cluster-node1:
    build:
      context: .
      target: node1
    container_name: cluster-node1
    hostname: cluster-host1
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "9922:9922"
    environment:
      - NODE_NAME=node1@cluster-host1
    depends_on:
      etcd:
        condition: service_healthy
      slowweb:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/health/live"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - observability-net

  cluster-node2:
    build:
      context: .
      target: node2
    container_name: cluster-node2
    hostname: cluster-host2
    restart: unless-stopped
    mem_limit: 128m
    environment:
      - NODE_NAME=node2@cluster-host2
    depends_on:
      etcd:
        condition: service_healthy
      slowweb:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/health/live"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - observability-net

  cluster-node3:
    build:
      context: .
      target: node3
    container_name: cluster-node3
    hostname: cluster-host3
    restart: unless-stopped
    mem_limit: 128m
    environment:
      - NODE_NAME=node3@cluster-host3
    depends_on:
      etcd:
        condition: service_healthy
      slowweb:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/health/live"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - observability-net

  cluster-node4:
    build:
      context: .
      target: node4
    container_name: cluster-node4
    hostname: cluster-host4
    restart: unless-stopped
    mem_limit: 128m
    environment:
      - NODE_NAME=node4@cluster-host4
    depends_on:
      etcd:
        condition: service_healthy
      slowweb:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/health/live"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - observability-net

  cluster-node5:
    build:
      context: .
      target: node5
    container_name: cluster-node5
    hostname: cluster-host5
    restart: unless-stopped
    mem_limit: 128m
    environment:
      - NODE_NAME=node5@cluster-host5
    depends_on:
      etcd:
        condition: service_healthy
      slowweb:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/health/live"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - observability-net

  observer:
    build:
      context: .
      target: observer
    container_name: observer
    hostname: observer
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - "9911:9911"
    environment:
      - NODE_NAME=observer@observer
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - observability-net

networks:
  observability-net:
    driver: bridge
